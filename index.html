<!doctype html>
<html lang="pt-BR">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymPro - Sistema de Gestão</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: #0f0f0f;
      color: #f3f4f6;
    }

    .font-display {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.05em;
    }

    html, body, #app {
      height: 100%;
      width: 100%;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div id="app"></div>
  <script>
    // Estado da aplicação
    let state = {
      loggedIn: false,
      currentPage: 'dashboard',
      students: [],
      teachers: [],
      plans: [],
      menuOpen: false
    };

    function renderApp() {
      const app = document.getElementById('app');
      app.innerHTML = state.loggedIn ? renderLayout() : renderLogin();
      bindEvents();
      lucide.createIcons();
    }

    function renderLogin() {
      return `
        <div class="h-full flex items-center justify-center p-4" style="background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%)">
          <div class="w-full max-w-sm p-8 rounded-2xl shadow-2xl bg-gray-900 border border-orange-500/20">
            <div class="text-center mb-8">
              <div class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-4 bg-orange-500/20">
                <i data-lucide="dumbbell" class="w-8 h-8 text-orange-500"></i>
              </div>
              <h1 class="font-display text-4xl text-orange-500 mb-2">GymPro</h1>
              <p class="text-sm opacity-60">Sistema de Gestão</p>
            </div>
            <form id="loginForm" class="space-y-4">
              <div>
                <label class="block text-sm mb-2 opacity-70">E-mail</label>
                <input type="email" id="email" placeholder="admin@gym.com" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 transition" required>
              </div>
              <div>
                <label class="block text-sm mb-2 opacity-70">Senha</label>
                <input type="password" id="pass" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 transition" required>
              </div>
              <button type="submit" class="w-full py-3 rounded-lg font-semibold text-white bg-orange-500 hover:bg-orange-600 transition">Entrar</button>
            </form>
          </div>
        </div>
      `;
    }

    function renderLayout() {
      const pages = [
        { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
        { id: 'students', icon: 'users', label: 'Alunos' },
        { id: 'teachers', icon: 'user-check', label: 'Professores' },
        { id: 'plans', icon: 'clipboard-list', label: 'Planos' }
      ];

      const nav = pages.map(p => `
        <button data-nav="${p.id}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg w-full text-left transition ${state.currentPage === p.id ? 'bg-orange-500/20 text-orange-500 font-semibold' : 'opacity-70 hover:opacity-100'}">
          <i data-lucide="${p.icon}" class="w-5 h-5"></i>
          <span>${p.label}</span>
        </button>
      `).join('');

      let content = '';
      if (state.currentPage === 'dashboard') content = renderDashboard();
      else if (state.currentPage === 'students') content = renderStudents();
      else if (state.currentPage === 'teachers') content = renderTeachers();
      else if (state.currentPage === 'plans') content = renderPlans();

      return `
        <div class="h-full flex flex-col md:flex-row">
          <!-- Mobile Header -->
          <div class="md:hidden flex items-center justify-between p-4 bg-gray-900 border-b border-gray-800">
            <span class="font-display text-2xl text-orange-500">GymPro</span>
            <button id="menuToggle"><i data-lucide="menu" class="w-6 h-6"></i></button>
          </div>
          
          <!-- Sidebar -->
          <aside class="${state.menuOpen ? 'block' : 'hidden'} md:block w-full md:w-60 flex-shrink-0 p-4 space-y-2 bg-gray-900 border-r border-gray-800 overflow-y-auto">
            <div class="hidden md:flex items-center gap-2 mb-6 px-2">
              <i data-lucide="dumbbell" class="w-6 h-6 text-orange-500"></i>
              <span class="font-display text-2xl text-orange-500">GymPro</span>
            </div>
            ${nav}
            <button id="logoutBtn" class="flex items-center gap-3 px-4 py-2.5 rounded-lg w-full text-left opacity-60 hover:opacity-100 mt-4 transition">
              <i data-lucide="log-out" class="w-5 h-5"></i>
              <span>Sair</span>
            </button>
          </aside>
          
          <!-- Main Content -->
          <main class="flex-1 p-4 md:p-8 overflow-y-auto">
            ${content}
          </main>
        </div>
      `;
    }

    function renderDashboard() {
      return `
        <h1 class="font-display text-3xl md:text-4xl mb-8">Olá, Admin! 💪</h1>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div class="p-6 rounded-xl bg-gray-900 border border-orange-500/20">
            <div class="flex items-center gap-3 mb-3">
              <i data-lucide="users" class="w-6 h-6 text-orange-500"></i>
              <span class="opacity-70 text-sm">Alunos</span>
            </div>
            <p class="font-display text-4xl text-orange-500">${state.students.length}</p>
          </div>
          <div class="p-6 rounded-xl bg-gray-900 border border-orange-500/20">
            <div class="flex items-center gap-3 mb-3">
              <i data-lucide="user-check" class="w-6 h-6 text-orange-500"></i>
              <span class="opacity-70 text-sm">Professores</span>
            </div>
            <p class="font-display text-4xl text-orange-500">${state.teachers.length}</p>
          </div>
          <div class="p-6 rounded-xl bg-gray-900 border border-orange-500/20">
            <div class="flex items-center gap-3 mb-3">
              <i data-lucide="clipboard-list" class="w-6 h-6 text-orange-500"></i>
              <span class="opacity-70 text-sm">Planos</span>
            </div>
            <p class="font-display text-4xl text-orange-500">${state.plans.length}</p>
          </div>
        </div>
      `;
    }

    function renderStudents() {
      return `
        <h2 class="font-display text-2xl mb-6">Cadastro de Alunos</h2>
        <form id="studentForm" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 p-5 rounded-xl mb-6 bg-gray-900 border border-gray-800">
          <input name="name" placeholder="Nome" required class="px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20" />
          <input name="age" type="number" placeholder="Idade" required class="px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20" />
          <input name="weight" type="number" step="0.1" placeholder="Peso (kg)" required class="px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20" />
          <input name="height" type="number" placeholder="Altura (cm)" required class="px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20" />
          <select name="plan" class="px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20" required>
            <option value="Todos os dias">Todos os dias</option>
            <option value="3x na semana">3x na semana</option>
          </select>
          <button type="submit" class="px-4 py-2.5 rounded-lg font-semibold text-white bg-orange-500 hover:bg-orange-600">Adicionar</button>
        </form>
        
        ${state.students.length > 0 ? `
          <div class="overflow-x-auto rounded-xl bg-gray-900 border border-gray-800">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-gray-800">
                  <th class="py-3 px-4 text-left opacity-70 font-semibold">Nome</th>
                  <th class="py-3 px-4 text-left opacity-70 font-semibold">Idade</th>
                  <th class="py-3 px-4 text-left opacity-70 font-semibold">Peso (kg)</th>
                  <th class="py-3 px-4 text-left opacity-70 font-semibold">Altura (cm)</th>
                  <th class="py-3 px-4 text-left opacity-70 font-semibold">Plano</th>
                  <th class="py-3 px-4 text-left opacity-70 font-semibold">Ação</th>
                </tr>
              </thead>
              <tbody>
                ${state.students.map((s, i) => `
                  <tr class="border-b border-gray-800 hover:bg-gray-800/50">
                    <td class="py-3 px-4">${s.name}</td>
                    <td class="py-3 px-4">${s.age}</td>
                    <td class="py-3 px-4">${s.weight}</td>
                    <td class="py-3 px-4">${s.height}</td>
                    <td class="py-3 px-4">${s.plan}</td>
                    <td class="py-3 px-4">
                      <button data-del-student="${i}" class="text-red-400 hover:text-red-300 transition">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                      </button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        ` : '<p class="opacity-50">Nenhum aluno cadastrado.</p>'}
      `;
    }

    function renderTeachers() {
      return `
        <h2 class="font-display text-2xl mb-6">Cadastro de Professores</h2>
        <form id="teacherForm" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 p-5 rounded-xl mb-6 bg-gray-900 border border-gray-800">
          <input name="name" placeholder="Nome" required class="px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20" />
          <input name="age" type="number" placeholder="Idade" required class="px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20" />
          <input name="cref" placeholder="CREF" required class="px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20" />
          <button type="submit" class="px-4 py-2.5 rounded-lg font-semibold text-white bg-orange-500 hover:bg-orange-600">Adicionar</button>
        </form>
        
        ${state.teachers.length > 0 ? `
          <div class="overflow-x-auto rounded-xl bg-gray-900 border border-gray-800">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-gray-800">
                  <th class="py-3 px-4 text-left opacity-70 font-semibold">Nome</th>
                  <th class="py-3 px-4 text-left opacity-70 font-semibold">Idade</th>
                  <th class="py-3 px-4 text-left opacity-70 font-semibold">CREF</th>
                  <th class="py-3 px-4 text-left opacity-70 font-semibold">Ação</th>
                </tr>
              </thead>
              <tbody>
                ${state.teachers.map((t, i) => `
                  <tr class="border-b border-gray-800 hover:bg-gray-800/50">
                    <td class="py-3 px-4">${t.name}</td>
                    <td class="py-3 px-4">${t.age}</td>
                    <td class="py-3 px-4">${t.cref}</td>
                    <td class="py-3 px-4">
                      <button data-del-teacher="${i}" class="text-red-400 hover:text-red-300 transition">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                      </button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        ` : '<p class="opacity-50">Nenhum professor cadastrado.</p>'}
      `;
    }

    function renderPlans() {
      return `
        <h2 class="font-display text-2xl mb-6">Cadastro de Planos</h2>
        <form id="planForm" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 p-5 rounded-xl mb-6 bg-gray-900 border border-gray-800">
          <input name="name" placeholder="Nome do Plano" required class="px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20" />
          <input name="desc" placeholder="Descrição" required class="px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20" />
          <input name="freq" placeholder="Frequência" required class="px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20" />
          <input name="price" type="number" step="0.01" placeholder="Preço (R$)" required class="px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20" />
          <button type="submit" class="px-4 py-2.5 rounded-lg font-semibold text-white bg-orange-500 hover:bg-orange-600 col-span-1 sm:col-span-2 lg:col-span-1">Adicionar</button>
        </form>
        
        ${state.plans.length > 0 ? `
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            ${state.plans.map((p, i) => `
              <div class="p-5 rounded-xl bg-gray-900 border border-gray-800 relative hover:border-orange-500/50 transition">
                <button data-del-plan="${i}" class="absolute top-3 right-3 text-red-400 hover:text-red-300">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
                <h3 class="font-semibold text-lg text-orange-500 mb-2">${p.name}</h3>
                <p class="opacity-70 text-sm mb-2">${p.desc}</p>
                <p class="text-sm opacity-60 mb-3">📅 ${p.freq}</p>
                <p class="font-display text-2xl text-orange-500">R$ ${parseFloat(p.price).toFixed(2)}</p>
              </div>
            `).join('')}
          </div>
        ` : '<p class="opacity-50">Nenhum plano cadastrado.</p>'}
      `;
    }

    function bindEvents() {
      // Login
      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', (e) => {
          e.preventDefault();
          state.loggedIn = true;
          renderApp();
        });
      }

      // Navigation
      document.querySelectorAll('[data-nav]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.currentPage = btn.dataset.nav;
          state.menuOpen = false;
          renderApp();
        });
      });

      // Mobile menu toggle
      const menuToggle = document.getElementById('menuToggle');
      if (menuToggle) {
        menuToggle.addEventListener('click', () => {
          state.menuOpen = !state.menuOpen;
          renderApp();
        });
      }

      // Logout
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          state.loggedIn = false;
          state.currentPage = 'dashboard';
          state.menuOpen = false;
          renderApp();
        });
      }

      // Student form
      const studentForm = document.getElementById('studentForm');
      if (studentForm) {
        studentForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const fd = new FormData(studentForm);
          state.students.push({
            name: fd.get('name'),
            age: fd.get('age'),
            weight: fd.get('weight'),
            height: fd.get('height'),
            plan: fd.get('plan')
          });
          studentForm.reset();
          renderApp();
        });
      }

      // Teacher form
      const teacherForm = document.getElementById('teacherForm');
      if (teacherForm) {
        teacherForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const fd = new FormData(teacherForm);
          state.teachers.push({
            name: fd.get('name'),
            age: fd.get('age'),
            cref: fd.get('cref')
          });
          teacherForm.reset();
          renderApp();
        });
      }

      // Plan form
      const planForm = document.getElementById('planForm');
      if (planForm) {
        planForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const fd = new FormData(planForm);
          state.plans.push({
            name: fd.get('name'),
            desc: fd.get('desc'),
            freq: fd.get('freq'),
            price: fd.get('price')
          });
          planForm.reset();
          renderApp();
        });
      }

      // Delete buttons
      document.querySelectorAll('[data-del-student]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.students.splice(parseInt(btn.dataset.delStudent), 1);
          renderApp();
        });
      });

      document.querySelectorAll('[data-del-teacher]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.teachers.splice(parseInt(btn.dataset.delTeacher), 1);
          renderApp();
        });
      });

      document.querySelectorAll('[data-del-plan]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.plans.splice(parseInt(btn.dataset.delPlan), 1);
          renderApp();
        });
      });
    }

    // Initialize app
    renderApp();
  </script>

</html>
